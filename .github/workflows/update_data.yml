name: Update Focus Bulletin Data

on:
  schedule:
    - cron: "0 12 * * 1"   # toda segunda-feira às 12:00 UTC (09:00 Brasília)
  workflow_dispatch:          # permite disparo manual pela UI do GitHub

permissions:
  contents: write             # necessário para o git push ao final

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and save data
        run: python scripts/fetch_data.py

      - name: Commit and push updated Parquet files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/
          git diff --staged --quiet || git commit -m "data: update Focus Bulletin data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
